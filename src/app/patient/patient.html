<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-5"></div>
      @if(title == 'Patients'){
        <h5>{{title}}</h5>
      }
     
      <div class="col-7">
        <input class="form-control me-2" type="search" placeholder= "title" aria-label="Search"/>
      </div>
      <div class="col-4">
        
        <button class="btn btn-primary" (click)="getInfoPatient()">Ajouter un patient</button>
        
      </div>
    </div>
  </div>
  <div class="card-body"></div>
    <table class="table">
        <thead>
           <tr>
            <th scope="col">#</th>
            <th scope="col">Nom</th>
             <th scope="col">Prenom</th>
            <th scope="col">Email</th>
            <th scope="col">Âge</th>
            
          </tr>
        </thead>
        <tbody>
          @for(item of tableauPatients2 ; track $index){
            <tr>
              <th scope="col">{{$index+1}}</th>
              <td>{{item.prenom}}</td>
              <td>{{item.nom}}</td>
              <td>{{item.mail}}</td>
              <td>{{item.age}}</td>
            </tr>
          }
        </tbody>
</table>
</div>
