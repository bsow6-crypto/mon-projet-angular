<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-5"></div>
      @if(title == 'Patients'){
        <h5>{{title}}</h5>
      }
     
      <div class="col-7">
        <input class="form-control me-2" type="search" placeholder= "title" aria-label="Search"/>
      </div>
      <div class="col-4">
        
        <button class="btn btn-primary" (click)="getInfoPatient()">Ajouter un patient</button>
        
      </div>
    </div>
  </div>
  <div class="card-body"></div>
    <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nom</th>
            <th scope="col">Email</th>
          </tr>
        </thead>
        <tbody>
          @for(item of patients ; track $index){
            <tr>
              <th scope="col">{{$index+1}}</th>
              <td>{{item.prenom}}</td>
              <td>{{item.nom}}</td>
              <td>{{item.email}}</td>
            </tr>
          }
        
        <tr>
          <th scope="row">{{getSomme(2,3)}}</th>
          <td>Raby</td>
          <td>Ngaido</td>
          <td>rabyngaido65@gmail.com</td>
          
          
        </tr>
        <tr>
          <th scope="row">{{getEmail()}}</th>
          <td>Fatou </td>
          <td>Kebe</td>
          <td>fatoukebe@gmail.com</td>
          
          
        </tr>
        </tbody>
</table>
</div>
