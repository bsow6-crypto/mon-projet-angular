<div class="container mt-4">
  <h3 class="mb-4">Formulaire Patient</h3>

  <form>
    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input type="text" class="form-control" placeholder="Entrer le nom">
    </div>

    <div class="mb-3">
      <label class="form-label">Prénom</label>
      <input type="text" class="form-control" placeholder="Entrer le prénom">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="Entrer l'email">
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="check1">
      <label class="form-check-label" for="check1">
        Accepter les conditions
      </label>
    </div>

    <button type="submit" class="btn btn-primary">
      Enregistrer
    </button>
  </form>
</div>
